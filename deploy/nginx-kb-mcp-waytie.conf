# /etc/nginx/sites-available/kb-mcp.waytie.com
# Proxy to kb-gateway MCP (streamable-http) on localhost:8790
# Rate limit: include deploy/nginx-kb-mcp-rate-limit.conf in http {} via conf.d

server {
    listen 80;
    listen [::]:80;
    server_name kb-mcp.waytie.com;

    location /mcp {
        limit_req zone=kb_mcp_rl burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8790/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:8790;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        client_max_body_size 1m;
    }

    location / {
        return 404;
    }
}
